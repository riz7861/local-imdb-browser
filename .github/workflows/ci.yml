name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        run: >
          python -m py_compile
          app.py
          db_paths.py
          setup_imdb.py
          manage_users.py
          fetch_external_ratings.py
          fetch_posters.py
          build_slim_db.py
          tests/test_app.py
          tests/test_slim_db.py

      - name: Run tests
        run: python -m pytest -q
